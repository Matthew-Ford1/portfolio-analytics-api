services:
  db:
    image: postgres:latest

    environment:
      - TZ=Australia/Sydney
      - PGTZ=Australia/Sydney

    ports:
      - "5432:5432"
    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
